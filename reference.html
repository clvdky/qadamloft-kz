<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #110d0b;
      --text: #ffffff;
      --line: rgba(255, 255, 255, 0.72);
      --muted: rgba(255, 255, 255, 0.92);
      --chip: rgba(34, 31, 39, 0.72);
      --chip-border: rgba(255, 255, 255, 0.12);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
      --gutter: clamp(20px, 2.5vw, 40px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Manrope", Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(23, 16, 11, 0.36) 0%, rgba(23, 16, 11, 0.46) 46%, rgba(17, 13, 11, 0.72) 100%),
        url("https://static.tildacdn.com/tild3637-3034-4564-b262-363865356661/4.jpg") center bottom / cover no-repeat;
      isolation: isolate;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 78%, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0) 35%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 30%);
      z-index: 0;
      pointer-events: none;
    }

    .header {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 18px 28px;
      align-items: start;
      padding: 24px var(--gutter) 0;
    }

    .header::after {
      content: "";
      position: absolute;
      left: var(--gutter);
      right: var(--gutter);
      top: 54px;
      height: 1px;
      background: var(--line);
    }

    .brand {
      display: grid;
      gap: 10px;
      align-self: start;
    }

    .brand__logo {
      width: clamp(126px, 10vw, 141px);
    }

    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px clamp(14px, 1.5vw, 26px);
      padding-top: 0;
    }

    .nav__link {
      font-size: 0.86rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      white-space: nowrap;
      transition: opacity 0.2s ease, background-color 0.2s ease, color 0.2s ease;
    }

    .nav__link:hover,
    .socials a:hover,
    .chip:hover,
    .phone:hover {
      opacity: 0.82;
    }

    .nav__link--active {
      padding: 7px 14px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      background: #ffffff;
      color: #111111;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      max-width: 540px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 27px;
      padding: 7px 14px;
      border: 1px solid var(--chip-border);
      background: var(--chip);
      backdrop-filter: blur(8px);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      white-space: nowrap;
      box-shadow: var(--shadow);
    }

    .chip--cta {
      padding-inline: 24px;
    }

    .phone {
      grid-column: 3;
      justify-self: end;
      margin-top: -2px;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }

    .bottom {
      position: absolute;
      right: var(--gutter);
      bottom: 18px;
      left: var(--gutter);
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto minmax(220px, 1fr);
      align-items: end;
      gap: 20px;
    }

    .wordmark--left {
      width: min(31vw, 540px);
      min-width: 260px;
      justify-self: start;
    }

    .wordmark--right {
      width: min(29vw, 470px);
      min-width: 220px;
      justify-self: end;
    }

    .centerpiece {
      display: grid;
      justify-items: center;
      gap: 14px;
      margin-bottom: 30px;
    }

    .slogan {
      max-width: 460px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(0.7rem, 0.82vw, 0.92rem);
      font-weight: 800;
      line-height: 1.35;
      letter-spacing: -0.04em;
      text-align: center;
      text-transform: uppercase;
      text-wrap: balance;
    }

    .arrow-group {
      display: flex;
      gap: 6px;
    }

    .arrow {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.88);
      background: rgba(255, 255, 255, 0.06);
    }

    .arrow img {
      width: 14px;
      height: 14px;
    }

    .arrow--prev img {
      transform: rotate(180deg);
    }

    @media (max-width: 1180px) {
      .header {
        grid-template-columns: auto 1fr;
      }

      .nav {
        justify-content: flex-start;
      }

      .actions,
      .phone {
        grid-column: 2;
        justify-self: end;
      }

      .bottom {
        grid-template-columns: minmax(220px, 1fr) auto minmax(180px, 1fr);
      }

      .wordmark--left {
        width: min(34vw, 500px);
      }

      .wordmark--right {
        width: min(26vw, 360px);
      }
    }

    @media (max-width: 900px) {
      .hero {
        min-height: 100svh;
      }

      .header {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .header::after {
        top: 52px;
      }

      .nav,
      .actions,
      .phone {
        grid-column: 1;
        justify-self: start;
      }

      .actions {
        max-width: none;
      }

      .bottom {
        bottom: 20px;
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .wordmark--left {
        width: min(68vw, 420px);
        min-width: 220px;
      }

      .wordmark--right {
        width: min(52vw, 270px);
        min-width: 180px;
      }

      .centerpiece {
        margin-bottom: 0;
      }
    }

    @media (max-width: 640px) {
      .hero {
        background-position: 64% bottom;
      }

      .header {
        padding-top: 20px;
      }

      .header::after {
        top: 48px;
      }

      .socials,
      .nav__link,
      .chip,
      .phone {
        font-size: 0.72rem;
      }

      .nav {
        gap: 10px 16px;
      }

      .nav__link--active {
        padding: 6px 12px;
      }

      .chip {
        padding: 7px 12px;
      }

      .chip--cta {
        padding-inline: 18px;
      }

      .bottom {
        left: 20px;
        right: 20px;
      }

      .centerpiece {
        justify-items: start;
      }

      .slogan {
        max-width: 280px;
        font-size: 0.72rem;
        text-align: left;
        text-wrap: initial;
      }

      .arrow-group {
        justify-content: flex-start;
      }

      .wordmark--left {
        width: min(82vw, 360px);
      }

      .wordmark--right {
        width: min(56vw, 230px);
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <header class="header">
      <div class="brand">
        <a href="https://mysimpleform.ru/" aria-label="Simple Form">
          <img
            class="brand__logo"
            src="https://static.tildacdn.com/tild3862-3034-4839-b736-313563386436/_white.svg"
            alt="Simple Form"
          >
        </a>
        <div class="socials">
          <a href="https://t.me/simple_form_blog" target="_blank" rel="noreferrer">Telegram</a>
          <a href="https://www.instagram.com/simple_form__" target="_blank" rel="noreferrer">Instagram</a>
        </div>
      </div>

      <nav class="nav" aria-label="Основная навигация">
        <a class="nav__link nav__link--active" href="https://mysimpleform.ru/catalog">Каталог</a>
        <a class="nav__link" href="https://mysimpleform.ru/complex-furniture">Корпусная мебель</a>
        <a class="nav__link" href="https://mysimpleform.ru/about">О бренде</a>
        <a class="nav__link" href="https://mysimpleform.ru/cooperation">Сотрудничество</a>
        <a class="nav__link" href="https://mysimpleform.ru/info">Покупателям</a>
        <a class="nav__link" href="https://mysimpleform.ru/contacts">Контакты</a>
      </nav>

      <div class="actions">
        <a class="chip" href="https://mysimpleform.ru/#showfavorites">Избранное ( 0 )</a>
        <a class="chip" href="https://mysimpleform.ru/#opencart">Корзина ( 0 )</a>
        <a class="chip chip--cta" href="https://mysimpleform.ru/#zeropopup:consultation">Получить консультацию</a>
      </div>

      <a class="phone" href="tel:+79933473762">+7 993 347 37 62</a>
    </header>

    <div class="bottom">
      <img
        class="wordmark wordmark--left"
        src="QADAM.png"
        alt="QADAM"
      >

      <div class="centerpiece">
        <p class="slogan">Изготавливаем мебель по индивидуальному дизайну из высококачественных материалов</p>
        <div class="arrow-group" aria-hidden="true">
          <span class="arrow arrow--prev">
            <img src="https://static.tildacdn.com/tild3933-6234-4631-a333-396131623031/arrow_white.svg" alt="">
          </span>
          <span class="arrow">
            <img src="https://static.tildacdn.com/tild3933-6234-4631-a333-396131623031/arrow_white.svg" alt="">
          </span>
        </div>
      </div>

      <img
        class="wordmark wordmark--right"
        src="LOFT.png"
        alt="LOFT"
      >
    </div>
  </main>
</body>
</html>
