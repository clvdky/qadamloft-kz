<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #110d0b;
      --text: #ffffff;
      --line: rgba(255, 255, 255, 0.72);
      --hero-dark: #28252b;
      --hero-accent: #e52420;
      --muted: rgba(255, 255, 255, 0.92);
      --gutter: 40px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Manrope", Arial, sans-serif;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(23, 16, 11, 0.36) 0%, rgba(23, 16, 11, 0.46) 46%, rgba(17, 13, 11, 0.72) 100%),
        url("https://static.tildacdn.com/tild3438-3763-4234-b330-333738383439/3_1.png") center bottom / cover no-repeat;
      isolation: isolate;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 78%, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0) 35%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 30%);
      pointer-events: none;
      z-index: 0;
    }

    .header {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 5;
      height: 70px;
    }

    .header::after {
      content: "";
      position: absolute;
      left: var(--gutter);
      right: var(--gutter);
      top: 45px;
      height: 1px;
      background: var(--line);
    }

    .brand {
      position: absolute;
      top: 20px;
      left: var(--gutter);
      width: 141px;
    }

    .nav {
      position: absolute;
      top: 21px;
      left: 50%;
      display: flex;
      align-items: center;
      gap: 18px;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .nav__link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 20px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      transition: color 0.2s ease, background-color 0.2s ease, opacity 0.2s ease;
    }

    .nav__link:hover,
    .socials a:hover,
    .actions a:hover,
    .phone:hover,
    .menu-link:hover {
      color: var(--hero-accent);
    }

    .nav__link--active {
      min-width: 68px;
      padding: 0 12px;
      background: #ffffff;
      color: #28252b;
    }

    .socials {
      position: absolute;
      top: 46px;
      left: 35px;
      display: flex;
      gap: 0;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .socials a + a {
      margin-left: 13px;
    }

    .actions {
      position: absolute;
      top: 21px;
      right: 40px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 20px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--hero-dark);
      color: #ffffff;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      transition: color 0.2s ease, background-color 0.2s ease;
    }

    .action--consult {
      min-width: 180px;
      margin-left: 6px;
    }

    .action__icon {
      display: none;
      width: 12px;
      height: 12px;
      flex: 0 0 auto;
    }

    .action__count {
      white-space: nowrap;
    }

    .phone {
      position: absolute;
      top: 46px;
      right: 40px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .menu-link {
      position: absolute;
      top: 21px;
      right: 40px;
      display: none;
      min-height: 20px;
      align-items: center;
      justify-content: center;
      min-width: 60px;
      background: #ffffff;
      color: #28252b;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .hero-layout {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .wordmark {
      position: absolute;
      z-index: 1;
    }

    .wordmark--left {
      left: 40px;
      bottom: 15px;
      width: min(427px, 31vw);
      min-width: 280px;
    }

    .wordmark--right {
      right: 40px;
      bottom: 15px;
      width: min(321px, 24vw);
      min-width: 220px;
    }

    .centerpiece {
      position: absolute;
      left: 50%;
      bottom: 40px;
      display: grid;
      justify-items: center;
      gap: 14px;
      width: min(460px, calc(100vw - 480px));
      transform: translateX(-50%);
      text-align: center;
      z-index: 2;
    }

    .slogan {
      order: 1;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      text-wrap: balance;
    }

    .arrow-group {
      order: 2;
      display: flex;
      gap: 4px;
      z-index: 4;
    }

    .arrow {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.95);
      background: rgba(17, 13, 11, 0.1);
    }

    .arrow img {
      width: 12px;
      height: 12px;
    }

    .arrow--prev img {
      transform: rotate(180deg);
    }

    @media (max-width: 1199px) {
      .nav {
        gap: 12px;
      }

      .nav__link {
        font-size: 9px;
      }

      .nav__link--active {
        min-width: 62px;
      }

      .actions {
        right: 104px;
      }

      .menu-link {
        display: inline-flex;
      }

      .wordmark--left {
        width: 344px;
        min-width: 0;
      }

      .wordmark--right {
        width: 258px;
        min-width: 0;
      }

      .centerpiece {
        width: 300px;
      }

      .slogan {
        font-size: 12px;
      }
    }

    @media (max-width: 959px) {
      :root {
        --gutter: 20px;
      }

      .hero {
        background-position: 60% bottom;
      }

      .nav,
      .nav__link--active,
      .action--consult {
        display: none;
      }

      .socials {
        left: 15px;
      }

      .actions {
        right: 88px;
        gap: 6px;
      }

      .action {
        padding: 0 10px;
      }

      .menu-link {
        right: 20px;
      }

      .phone {
        right: 15px;
      }

      .wordmark--left {
        left: 20px;
        bottom: 4px;
        width: min(316px, 40vw);
      }

      .wordmark--right {
        right: 20px;
        bottom: 4px;
        width: min(238px, 31vw);
      }

      .centerpiece {
        bottom: 130px;
        width: 300px;
      }
    }

    @media (max-width: 639px) {
      .wordmark--left {
        width: min(240px, 62vw);
      }

      .wordmark--right {
        width: min(182px, 48vw);
      }

      .centerpiece {
        bottom: 110px;
        width: min(300px, calc(100vw - 40px));
      }

      .slogan {
        font-size: 12px;
      }
    }

    @media (max-width: 479px) {
      .hero {
        background:
          linear-gradient(180deg, rgba(23, 16, 11, 0.28) 0%, rgba(23, 16, 11, 0.42) 48%, rgba(17, 13, 11, 0.7) 100%),
          url("https://static.tildacdn.com/tild6564-3162-4732-a339-363762633133/5.jpg") center bottom / cover no-repeat;
      }

      .brand {
        top: 19px;
        left: 16px;
        width: 108px;
      }

      .header::after {
        left: 16px;
        right: 16px;
        top: 44px;
      }

      .socials,
      .phone,
      .menu-link,
      .action {
        font-size: 8px;
      }

      .socials {
        top: 46px;
        left: 16px;
      }

      .actions {
        top: 18px;
        right: 78px;
        gap: 4px;
      }

      .action {
        min-width: 40px;
        min-height: 18px;
        padding: 0 6px;
      }

      .action__label {
        display: none;
      }

      .action__icon {
        display: block;
      }

      .action__count {
        display: inline;
      }

      .menu-link {
        top: 18px;
        right: 16px;
        min-width: 50px;
        min-height: 18px;
        padding: 0 8px;
      }

      .phone {
        top: 46px;
        right: 16px;
        font-size: 8px;
      }

      .wordmark--left {
        left: 16px;
        right: auto;
        top: auto;
        bottom: 88px;
        width: min(188px, 56vw);
      }

      .wordmark--right {
        left: 16px;
        right: auto;
        top: auto;
        bottom: 22px;
        width: min(152px, 46vw);
      }

      .centerpiece {
        inset: 0;
        width: auto;
        transform: none;
        display: block;
      }

      .slogan {
        position: absolute;
        top: 82px;
        left: 16px;
        order: initial;
        max-width: 230px;
        font-size: 12px;
        line-height: 1.15;
        text-align: left;
        text-wrap: initial;
      }

      .arrow-group {
        position: absolute;
        right: 16px;
        bottom: 24px;
        order: initial;
      }

      .arrow {
        width: 30px;
        height: 30px;
        background: rgba(17, 13, 11, 0.14);
      }
    }

    @media (max-width: 359px) {
      .brand {
        width: 126px;
      }

      .actions {
        right: 72px;
      }

      .menu-link {
        min-width: 48px;
      }

      .wordmark--left {
        width: min(178px, 58vw);
      }

      .wordmark--right {
        width: min(146px, 48vw);
      }

      .slogan {
        max-width: 210px;
        font-size: 11px;
      }

      .arrow-group {
        bottom: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <header class="header">
      <a class="brand" href="https://mysimpleform.ru/" aria-label="Simple Form">
        <img
          src="https://static.tildacdn.com/tild3862-3034-4839-b736-313563386436/_white.svg"
          alt="Simple Form"
        >
      </a>

      <nav class="nav" aria-label="Основная навигация">
        <a class="nav__link nav__link--active" href="https://mysimpleform.ru/catalog">Каталог</a>
        <a class="nav__link" href="https://mysimpleform.ru/complex-furniture">Корпусная мебель</a>
        <a class="nav__link" href="https://mysimpleform.ru/about">О бренде</a>
        <a class="nav__link" href="https://mysimpleform.ru/cooperation">Сотрудничество</a>
        <a class="nav__link" href="https://mysimpleform.ru/info">Покупателям</a>
        <a class="nav__link" href="https://mysimpleform.ru/contacts">Контакты</a>
      </nav>

      <div class="socials">
        <a href="https://t.me/simple_form_blog" target="_blank" rel="noreferrer">Telegram</a>
        <a href="https://www.instagram.com/simple_form__" target="_blank" rel="noreferrer">Instagram</a>
      </div>

      <div class="actions">
        <a class="action" href="https://mysimpleform.ru/#showfavorites" aria-label="Избранное">
          <img
            class="action__icon"
            src="https://static.tildacdn.com/tild6539-6132-4438-b039-353962323930/icon_fav.svg"
            alt=""
          >
          <span class="action__label">Избранное</span>
          <span class="action__count">( 0 )</span>
        </a>
        <a class="action" href="https://mysimpleform.ru/#opencart" aria-label="Корзина">
          <img
            class="action__icon"
            src="https://static.tildacdn.com/tild3161-3862-4764-a365-396164386361/icon_shopping_cart.svg"
            alt=""
          >
          <span class="action__label">Корзина</span>
          <span class="action__count">( 0 )</span>
        </a>
        <a class="action action--consult" href="https://mysimpleform.ru/#zeropopup:consultation">Получить консультацию</a>
      </div>

      <a class="phone" href="tel:+79933473762">+7 993 347 37 62</a>
      <a class="menu-link" href="https://mysimpleform.ru/#popup:zeromenu">Меню</a>
    </header>

    <div class="hero-layout">
      <img
        class="wordmark wordmark--left"
        src="https://static.tildacdn.com/tild3664-6166-4331-b862-643362343430/_simple.svg"
        alt="Simple"
      >

      <img
        class="wordmark wordmark--right"
        src="https://static.tildacdn.com/tild3034-3565-4432-b335-303638653636/_form.svg"
        alt="Form"
      >

      <div class="centerpiece">
        <p class="slogan">Изготавливаем мебель по индивидуальному дизайну из высококачественных материалов</p>
        <div class="arrow-group" aria-hidden="true">
          <span class="arrow arrow--prev">
            <img src="https://static.tildacdn.com/tild3933-6234-4631-a333-396131623031/arrow_white.svg" alt="">
          </span>
          <span class="arrow">
            <img src="https://static.tildacdn.com/tild3933-6234-4631-a333-396131623031/arrow_white.svg" alt="">
          </span>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
